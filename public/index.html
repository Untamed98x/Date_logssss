<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Date Spots 🗺️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --cream:#f5f0e8; --warm:#e8dcc8; --ink:#1a1410;
  --rust:#c4622d; --gold:#c9a84c; --paper:#faf7f2;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Mono',monospace;background:var(--cream);color:var(--ink)}

header{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:var(--ink);color:var(--cream);
  height:52px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--rust);
}
.logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic}
.logo span{color:var(--gold)}
.hbtns{display:flex;gap:8px}
.hbtn{
  background:transparent;border:1px solid rgba(255,255,255,.25);
  color:var(--cream);padding:5px 11px;
  font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;
  cursor:pointer;text-decoration:none;transition:all .2s;
  display:inline-flex;align-items:center;white-space:nowrap;
}
.hbtn:hover,.hbtn.rust{background:var(--rust);border-color:var(--rust)}

#map{position:fixed;top:52px;left:0;right:0;bottom:0;z-index:1}

/* B&W Stamen Toner map */
.leaflet-tile-pane{filter:grayscale(1) contrast(1.15) brightness(1.05)}

/* ── 3D MARKER STYLES ── */
.marker-3d {
  position: relative;
  width: 36px;
  height: 36px;
  cursor: pointer;
  filter: drop-shadow(2px 6px 4px rgba(0,0,0,0.4));
  transition: transform 0.2s ease, filter 0.2s ease;
}
.marker-3d:hover {
  transform: translateY(-4px) scale(1.1);
  filter: drop-shadow(2px 10px 8px rgba(0,0,0,0.5));
}
.marker-3d.big {
  transform: translateY(-4px) scale(1.15);
  filter: drop-shadow(2px 10px 8px rgba(0,0,0,0.5));
}
.marker-pin {
  width: 36px;
  height: 44px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  /* 3D effect via gradients */
  box-shadow:
    inset -3px -3px 6px rgba(0,0,0,0.25),
    inset 2px 2px 4px rgba(255,255,255,0.3);
}
.marker-pin::before {
  content: '';
  position: absolute;
  top: 4px; left: 4px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
}
.marker-emoji {
  transform: rotate(45deg);
  font-size: 14px;
  line-height: 1;
  position: relative;
  z-index: 1;
}
/* Shadow dot below marker */
.marker-shadow {
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 16px;
  height: 6px;
  background: rgba(0,0,0,0.2);
  border-radius: 50%;
  filter: blur(2px);
}
/* Pulse ring for active marker */
.marker-pulse {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 50px; height: 50px;
  border-radius: 50%;
  border: 2px solid currentColor;
  animation: pulse-ring 1.5s ease-out infinite;
  pointer-events: none;
}
@keyframes pulse-ring {
  0%  { transform: translate(-50%,-50%) scale(0.5); opacity: 0.8; }
  100%{ transform: translate(-50%,-50%) scale(1.8); opacity: 0; }
}

/* bottom sheet */
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:500;
  background:var(--paper);
  border-radius:18px 18px 0 0;
  border-top:2px solid var(--ink);
  box-shadow:0 -4px 20px rgba(0,0,0,.15);
  transform:translateY(calc(100% - 78px));
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  max-height:78dvh;
  display:flex;flex-direction:column;
}
.sheet.open{transform:translateY(0)}
.sheet-handle-area{padding:10px 16px 0;cursor:pointer;flex-shrink:0}
.sheet-handle{width:38px;height:4px;background:var(--warm);border-radius:2px;margin:0 auto 10px}
.sheet-peek{display:flex;align-items:center;justify-content:space-between;padding:0 2px 10px}
.peek-title{font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700}
.peek-sub{font-size:.58rem;color:#aaa;letter-spacing:.08em;margin-top:2px}
.sheet-stats{display:flex;gap:14px}
.ss{display:flex;flex-direction:column;align-items:center;gap:1px}
.ss-val{color:var(--gold);font-size:.78rem;font-weight:700}
.ss-lbl{color:#bbb;font-size:.5rem;letter-spacing:.1em}

.filter-row{
  display:flex;gap:6px;overflow-x:auto;
  padding:0 16px 10px;flex-shrink:0;scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none}
.chip{
  padding:4px 10px;font-family:'DM Mono',monospace;font-size:.58rem;
  border:1px solid var(--warm);background:transparent;cursor:pointer;
  color:var(--ink);white-space:nowrap;letter-spacing:.05em;
  transition:all .15s;flex-shrink:0;
}
.chip.active,.chip:hover{background:var(--ink);color:var(--cream);border-color:var(--ink)}

.cards{overflow-y:auto;flex:1;padding-bottom:env(safe-area-inset-bottom,12px)}
.cards::-webkit-scrollbar{display:none}
.card{
  padding:12px 16px;border-bottom:1px solid var(--warm);
  cursor:pointer;transition:background .15s;
  display:flex;gap:10px;align-items:flex-start;
}
.card:active,.card.active{background:#ede8df}
.card.active{border-left:3px solid var(--rust);padding-left:13px}
.card-thumb{
  width:50px;height:50px;flex-shrink:0;
  background:var(--warm);overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
}
.card-thumb img{width:50px;height:50px;object-fit:cover;display:block}
.card-body{flex:1;min-width:0}
.card-name{font-family:'Playfair Display',serif;font-size:.86rem;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:.57rem;color:#aaa;margin-bottom:3px;display:flex;gap:6px;flex-wrap:wrap}
.card-mood{font-size:.57rem;padding:2px 5px;background:var(--warm);display:inline-block;margin-bottom:3px}
.card-story{font-size:.63rem;line-height:1.5;color:#666;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* popup */
.leaflet-popup-content-wrapper{
  border-radius:0!important;border:2px solid var(--ink)!important;
  box-shadow:5px 5px 0 rgba(0,0,0,.15)!important;padding:0!important;
  font-family:'DM Mono',monospace!important;
  width:258px;background:var(--paper)!important;
}
.leaflet-popup-tip{background:var(--ink)!important}
.leaflet-popup-content{margin:0!important;width:100%!important}
.pg{height:140px;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--warm),var(--cream))}
.pg img{width:100%;height:140px;object-fit:cover;position:absolute;opacity:0;transition:opacity .3s}
.pg img.show{opacity:1}
.pg .ph{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:2.2rem}
.pdots{position:absolute;bottom:6px;right:7px;display:flex;gap:3px;z-index:10}
.pdot{width:5px;height:5px;background:rgba(255,255,255,.4);cursor:pointer}
.pdot.on{background:#fff}
.pb{padding:12px 13px 10px}
.pn{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;margin-bottom:3px}
.pr{display:flex;justify-content:space-between;margin-bottom:6px;font-size:.58rem}
.pd{color:#aaa}.prat{color:var(--gold);font-size:.76rem}
.ps{font-size:.64rem;line-height:1.65;color:#444;border-left:2px solid var(--rust);padding-left:8px;font-style:italic;margin-bottom:8px}
.pf{display:flex;justify-content:space-between;border-top:1px solid var(--warm);padding-top:6px;font-size:.6rem}
.pm{color:var(--rust);text-decoration:none;border-bottom:1px solid var(--rust)}

.overlay{
  position:fixed;inset:0;background:var(--cream);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .4s;
}
.overlay.gone{opacity:0;pointer-events:none}
.ot{font-family:'Playfair Display',serif;font-size:1.5rem;font-style:italic}
.dots{display:flex;gap:8px}
.dot{width:7px;height:7px;background:var(--rust);animation:bounce .8s infinite alternate}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{from{transform:translateY(0);opacity:.3}to{transform:translateY(-10px);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
.empty{padding:28px 16px;text-align:center}
.ei{font-size:2rem;margin-bottom:8px}
.et{font-family:'Playfair Display',serif;font-style:italic;margin-bottom:5px}
.es{font-size:.6rem;color:#aaa;line-height:1.7}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="ot">date <span style="color:var(--gold)">spots</span></div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<header>
  <div class="logo">date <span>spots</span></div>
  <div class="hbtns">
    <a class="hbtn" href="https://www.notion.so/169ff260f2a7415cbb98ac89d586be50" target="_blank">↗ Notion</a>
    <button class="hbtn rust" id="rbtn" onclick="loadSpots()">↻</button>
  </div>
</header>

<div id="map"></div>

<div class="sheet" id="sheet">
  <div class="sheet-handle-area" onclick="toggleSheet()">
    <div class="sheet-handle"></div>
    <div class="sheet-peek">
      <div>
        <div class="peek-title">📍 Spots kita</div>
        <div class="peek-sub" id="psub">Loading...</div>
      </div>
      <div class="sheet-stats">
        <div class="ss"><div class="ss-val" id="scount">—</div><div class="ss-lbl">SPOTS</div></div>
        <div class="ss"><div class="ss-val" id="srating">—</div><div class="ss-lbl">AVG ★</div></div>
      </div>
    </div>
  </div>
  <div class="filter-row" id="frow">
    <button class="chip active" onclick="applyFilter('all',this)">Semua</button>
  </div>
  <div class="cards" id="cards">
    <div class="empty"><div class="ei">⏳</div><div class="et">Loading spots...</div></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  var map = L.map('map', {zoomControl:false}).setView([-6.2, 106.8], 11);
  L.control.zoom({position:'topright'}).addTo(map);

  // B&W Stamen Toner
  L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_toner/{z}/{x}/{y}{r}.png', {
    maxZoom:20,
    attribution:'© Stadia Maps © Stamen Design © OpenStreetMap'
  }).addTo(map);

  var ALL=[], MARKERS=[], activeFilter='all', sheetOpen=false, activeIdx=-1;

  window.toggleSheet = function() {
    sheetOpen = !sheetOpen;
    document.getElementById('sheet').classList.toggle('open', sheetOpen);
  };

  // Mood config — vivid colors pop on B&W map
  var MOODS = {
    '✨ Vibes banget': { color:'#e05c3a', grad:'linear-gradient(135deg,#e8624a,#c4441f)', emoji:'✨' },
    '😊 Seru':         { color:'#c9a84c', grad:'linear-gradient(135deg,#d4b55a,#a8872e)', emoji:'😊' },
    '😐 Biasa aja':    { color:'#6b9e7a', grad:'linear-gradient(135deg,#7aae8a,#4e7a5c)', emoji:'😐' },
    '😬 Awkward':      { color:'#9e9e9e', grad:'linear-gradient(135deg,#b0b0b0,#787878)', emoji:'😬' },
  };
  var DEFAULT_MOOD = { color:'#1a1410', grad:'linear-gradient(135deg,#333,#1a1410)', emoji:'📍' };

  function getMood(mood) { return MOODS[mood] || DEFAULT_MOOD; }

  function mkIcon(mood, active) {
    var m = getMood(mood);
    var sz = active ? 42 : 36;
    var pulse = active
      ? '<div class="marker-pulse" style="color:'+m.color+'"></div>'
      : '';
    return L.divIcon({
      html: '<div class="marker-3d '+(active?'big':'')+'" style="width:'+sz+'px;height:'+(sz+10)+'px">'
          + pulse
          + '<div class="marker-pin" style="background:'+m.grad+';width:'+sz+'px;height:'+(sz+8)+'px">'
          + '<span class="marker-emoji" style="font-size:'+(active?16:13)+'px">' + m.emoji + '</span>'
          + '</div>'
          + '<div class="marker-shadow"></div>'
          + '</div>',
      className: '',
      iconSize: [sz, sz+18],
      iconAnchor: [sz/2, sz+10],
      popupAnchor: [0, -(sz+10)]
    });
  }

  window.cycP = function(dot, idx) {
    var g = dot.closest('.pg');
    g.querySelectorAll('img').forEach(function(img,i){img.classList.toggle('show',i===idx);});
    g.querySelectorAll('.pdot').forEach(function(d,i){d.classList.toggle('on',i===idx);});
  };

  function popHtml(spot) {
    var photos = spot.photos||[], gal='';
    if(photos.length){
      var imgs = photos.map(function(u,i){
        return '<img src="'+u+'" class="'+(i===0?'show':'')+'" onerror="this.style.display=\'none\'">';
      }).join('');
      var dots = photos.length>1
        ? '<div class="pdots">'+photos.map(function(_,i){
            return '<div class="pdot '+(i===0?'on':'')+'" onclick="cycP(this,'+i+')"></div>';
          }).join('')+'</div>'
        : '';
      gal = '<div class="pg">'+imgs+dots+'</div>';
    } else {
      gal = '<div class="pg"><div class="ph">🌃</div></div>';
    }
    var fd = spot.date
      ? new Date(spot.date+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})
      : '—';
    return '<div>'+gal
      +'<div class="pb">'
      +'<div class="pn">'+spot.name+'</div>'
      +'<div class="pr"><span class="pd">'+fd+(spot.kota?' · '+spot.kota:'')+'</span>'
      +'<span class="prat">'+(spot.rating||'')+'</span></div>'
      +(spot.story?'<div class="ps">'+spot.story+'</div>':'')
      +'<div class="pf"><span>'+(spot.mood||'')+'</span>'
      +(spot.gmaps?'<a class="pm" href="'+spot.gmaps+'" target="_blank">↗ Maps</a>':'')
      +'</div></div></div>';
  }

  function render(spots) {
    MARKERS.forEach(function(m){map.removeLayer(m);}); MARKERS=[];
    document.getElementById('cards').innerHTML='';
    if(!spots.length){
      document.getElementById('cards').innerHTML='<div class="empty"><div class="ei">🔍</div><div class="et">Belum ada spots</div><div class="es">Tambahin di Notion,<br>lalu klik ↻ Refresh</div></div>';
      return;
    }
    var bounds=[];
    spots.forEach(function(spot, i) {
      var lat=parseFloat(spot.lat), lng=parseFloat(spot.lng);
      if(isNaN(lat)||isNaN(lng)) return;
      bounds.push([lat,lng]);

      var m = L.marker([lat,lng], {icon:mkIcon(spot.mood, false)}).addTo(map);
      m.bindPopup(popHtml(spot), {maxWidth:258});
      m.on('click', function(){activate(i);});
      MARKERS.push(m);

      var fd = spot.date
        ? new Date(spot.date+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short'})
        : '';
      var el = document.createElement('div');
      el.className='card'; el.dataset.i=i;
      var thumb = spot.photos&&spot.photos[0] ? spot.photos[0] : '';
      var mc = getMood(spot.mood);
      el.innerHTML =
        '<div class="card-thumb" style="background:'+mc.color+'20">'
        +(thumb?'<img src="'+thumb+'" onerror="this.parentElement.innerHTML=\''+mc.emoji+'\'">':mc.emoji)
        +'</div>'
        +'<div class="card-body">'
        +'<div class="card-name">'+spot.name+'</div>'
        +'<div class="card-meta"><span style="color:var(--gold)">'+(spot.rating||'')+'</span>'
        +'<span>'+fd+'</span>'+(spot.kota?'<span>📍'+spot.kota+'</span>':'')+'</div>'
        +(spot.mood?'<div class="card-mood" style="background:'+mc.color+'22;border-left:2px solid '+mc.color+'">'+spot.mood+'</div>':'')
        +(spot.story?'<div class="card-story">'+spot.story+'</div>':'')
        +'</div>';
      el.onclick = function(){ activate(i); };
      document.getElementById('cards').appendChild(el);
    });

    if(bounds.length) map.fitBounds(bounds, {padding:[60,60]});
    buildFilters();
    updateStats(spots);
    document.getElementById('psub').textContent = spots.length+' tempat ter-log';
  }

  function activate(i) {
    activeIdx = i;
    ALL.forEach(function(_,j){
      if(MARKERS[j]) MARKERS[j].setIcon(mkIcon(ALL[j].mood, j===i));
    });
    if(MARKERS[i]){
      var lat=parseFloat(ALL[i].lat), lng=parseFloat(ALL[i].lng);
      if(!isNaN(lat)&&!isNaN(lng)) map.setView([lat,lng], Math.max(map.getZoom(),14), {animate:true});
      MARKERS[i].openPopup();
    }
    document.querySelectorAll('.card').forEach(function(c,j){
      c.classList.toggle('active', j===i);
      if(j===i) c.scrollIntoView({behavior:'smooth',block:'nearest'});
    });
    if(!sheetOpen){ sheetOpen=true; document.getElementById('sheet').classList.add('open'); }
  }

  function buildFilters(){
    var tags=new Set();
    ALL.forEach(function(s){(s.tags||[]).forEach(function(t){tags.add(t);});});
    var row=document.getElementById('frow');
    row.innerHTML='<button class="chip '+(activeFilter==='all'?'active':'')+'" onclick="applyFilter(\'all\',this)">Semua</button>';
    tags.forEach(function(t){
      var b=document.createElement('button');
      b.className='chip '+(activeFilter===t?'active':'');
      b.textContent=t;
      b.onclick=function(){applyFilter(t,b);};
      row.appendChild(b);
    });
  }

  window.applyFilter = function(f,btn){
    activeFilter=f;
    document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active');});
    btn.classList.add('active');
    ALL.forEach(function(s,i){
      var show=f==='all'||(s.tags||[]).indexOf(f)>-1;
      if(MARKERS[i]){ if(show) map.addLayer(MARKERS[i]); else map.removeLayer(MARKERS[i]); }
    });
    document.querySelectorAll('.card').forEach(function(c,i){
      c.style.display=(f==='all'||(ALL[i]&&(ALL[i].tags||[]).indexOf(f)>-1))?'':'none';
    });
    updateStats(ALL.filter(function(s){return f==='all'||(s.tags||[]).indexOf(f)>-1;}));
  };

  var RM={'⭐⭐⭐⭐⭐':5,'⭐⭐⭐⭐':4,'⭐⭐⭐':3,'⭐⭐':2,'⭐':1};
  function updateStats(spots){
    document.getElementById('scount').textContent=spots.length;
    var rated=spots.filter(function(s){return RM[s.rating];});
    document.getElementById('srating').textContent=rated.length
      ?(rated.reduce(function(a,s){return a+RM[s.rating];},0)/rated.length).toFixed(1)
      :'—';
  }

  window.loadSpots = async function(){
    var btn=document.getElementById('rbtn');
    btn.innerHTML='<span class="spin">↻</span>'; btn.disabled=true;
    try{
      var r=await fetch('/api/spots');
      if(!r.ok) throw new Error('API '+r.status);
      var data=await r.json();
      ALL=data.spots||[];
      render(ALL);
    }catch(e){
      document.getElementById('cards').innerHTML='<div class="empty"><div class="ei">⚠️</div><div class="et">Gagal load</div><div class="es">'+e.message+'</div></div>';
      document.getElementById('psub').textContent='Error';
    }finally{
      btn.innerHTML='↻'; btn.disabled=false;
    }
  };

  loadSpots().then(function(){
    setTimeout(function(){ document.getElementById('overlay').classList.add('gone'); }, 800);
  });

  map.on('click', function(){ map.closePopup(); });

});
</script>
</body>
</html>
