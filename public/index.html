<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Date Spots 🗺️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --cream:#f5f0e8; --warm:#e8dcc8; --ink:#1a1410;
  --rust:#c4622d; --gold:#c9a84c; --paper:#faf7f2;
  --red:#e02020;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'DM Mono',monospace;background:#111;color:var(--ink)}

header{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:var(--ink);color:var(--cream);
  height:52px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--red);
}
.logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic}
.logo span{color:var(--red)}
.hbtns{display:flex;gap:8px}
.hbtn{
  background:transparent;border:1px solid rgba(255,255,255,.25);
  color:var(--cream);padding:5px 11px;
  font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;
  cursor:pointer;text-decoration:none;transition:all .2s;
  display:inline-flex;align-items:center;white-space:nowrap;
}
.hbtn:hover,.hbtn.red{background:var(--red);border-color:var(--red)}

#map{position:fixed;top:52px;left:0;right:0;bottom:0;z-index:1}

/* OSM → grayscale clean */
.leaflet-tile-pane{
  filter: grayscale(1) brightness(1.1) contrast(0.95);
}

/* ── FOLIUM-STYLE MARKER ── */
/* Circle marker with white dot inside, shadow below — exactly like Folium */
.fmarker {
  position: relative;
  cursor: pointer;
}
.fmarker-circle {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: var(--red);
  border: 3px solid rgba(0,0,0,0.4);
  box-shadow:
    0 4px 8px rgba(0,0,0,0.4),
    0 1px 3px rgba(0,0,0,0.3),
    inset 0 -2px 4px rgba(0,0,0,0.2),
    inset 0 2px 4px rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .2s, box-shadow .2s;
  position: relative;
  overflow: hidden;
}
/* Glossy top shine */
.fmarker-circle::before {
  content: '';
  position: absolute;
  top: 3px; left: 5px;
  width: 40%; height: 35%;
  background: rgba(255,255,255,0.35);
  border-radius: 50%;
  transform: rotate(-30deg);
}
/* White center dot */
.fmarker-dot {
  width: 8px; height: 8px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  position: relative;
  z-index: 1;
}
/* Shadow ellipse below */
.fmarker-shadow {
  position: absolute;
  bottom: -6px; left: 50%;
  transform: translateX(-50%);
  width: 70%; height: 5px;
  background: rgba(0,0,0,0.25);
  border-radius: 50%;
  filter: blur(3px);
}
/* Active pulse */
.fmarker-pulse {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  border-radius: 50%;
  border: 2px solid var(--red);
  opacity: 0;
  animation: fpulse 1.8s ease-out infinite;
  pointer-events: none;
}
@keyframes fpulse {
  0%  { width: 100%; height: 100%; opacity: .9; }
  100%{ width: 280%; height: 280%; opacity: 0; }
}
.fmarker:hover .fmarker-circle {
  transform: scale(1.15);
  box-shadow: 0 6px 14px rgba(0,0,0,0.5), inset 0 -2px 4px rgba(0,0,0,0.2);
}
.fmarker.active .fmarker-circle {
  transform: scale(1.2);
  background: #c01010;
  box-shadow: 0 7px 16px rgba(0,0,0,0.55);
}

/* BOTTOM SHEET */
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:500;
  background:var(--paper);
  border-radius:20px 20px 0 0;
  border-top:2px solid var(--ink);
  box-shadow:0 -6px 28px rgba(0,0,0,.2);
  transform:translateY(calc(100% - 78px));
  transition:transform .38s cubic-bezier(.4,0,.2,1);
  max-height:78dvh;display:flex;flex-direction:column;
}
.sheet.open{transform:translateY(0)}
.sha{padding:10px 16px 0;cursor:pointer;flex-shrink:0}
.shh{width:40px;height:4px;background:var(--warm);border-radius:2px;margin:0 auto 10px}
.shp{display:flex;align-items:center;justify-content:space-between;padding:0 2px 10px}
.sht{font-family:'Playfair Display',serif;font-size:.92rem;font-weight:700}
.shs{font-size:.58rem;color:#aaa;letter-spacing:.08em;margin-top:2px}
.shst{display:flex;gap:14px}
.sv{display:flex;flex-direction:column;align-items:center;gap:1px}
.svv{color:var(--red);font-size:.8rem;font-weight:700}
.svl{color:#bbb;font-size:.5rem;letter-spacing:.1em}

.frow{display:flex;gap:6px;overflow-x:auto;padding:0 16px 10px;flex-shrink:0;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.chip{
  padding:4px 11px;font-family:'DM Mono',monospace;font-size:.58rem;
  border:1px solid var(--warm);background:transparent;cursor:pointer;
  color:var(--ink);white-space:nowrap;letter-spacing:.05em;
  transition:all .15s;flex-shrink:0;
}
.chip.active,.chip:hover{background:var(--ink);color:var(--cream);border-color:var(--ink)}

.cards{overflow-y:auto;flex:1;padding-bottom:env(safe-area-inset-bottom,16px)}
.cards::-webkit-scrollbar{display:none}
.card{
  padding:13px 16px;border-bottom:1px solid var(--warm);
  cursor:pointer;transition:background .15s;
  display:flex;gap:11px;align-items:flex-start;
}
.card:active,.card.active{background:#ede8df}
.card.active{border-left:3px solid var(--red);padding-left:13px}
.cthumb{width:52px;height:52px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border-radius:2px;}
.cthumb img{width:52px;height:52px;object-fit:cover;display:block}
.cbody{flex:1;min-width:0}
.cname{font-family:'Playfair Display',serif;font-size:.88rem;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta{font-size:.57rem;color:#aaa;margin-bottom:3px;display:flex;gap:6px;flex-wrap:wrap}
.cmood{font-size:.57rem;padding:2px 7px;border-left:2px solid var(--red);display:inline-block;margin-bottom:3px;background:rgba(224,32,32,.06)}
.cstory{font-size:.63rem;line-height:1.55;color:#666;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* POPUP */
.leaflet-popup-content-wrapper{
  border-radius:0!important;border:2px solid var(--ink)!important;
  box-shadow:5px 5px 0 rgba(0,0,0,.1)!important;padding:0!important;
  font-family:'DM Mono',monospace!important;
  width:260px;background:var(--paper)!important;
}
.leaflet-popup-tip{background:var(--ink)!important}
.leaflet-popup-content{margin:0!important;width:100%!important}
.pg{height:142px;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--warm),var(--cream))}
.pg img{width:100%;height:142px;object-fit:cover;position:absolute;opacity:0;transition:opacity .35s}
.pg img.show{opacity:1}
.pg .ph{width:100%;height:142px;display:flex;align-items:center;justify-content:center;font-size:2.4rem}
.pdots{position:absolute;bottom:7px;right:8px;display:flex;gap:4px;z-index:10}
.pdot{width:6px;height:6px;background:rgba(255,255,255,.4);cursor:pointer;border-radius:50%}
.pdot.on{background:#fff}
.pb{padding:12px 14px 11px}
.pn{font-family:'Playfair Display',serif;font-size:.96rem;font-weight:700;margin-bottom:3px}
.pr{display:flex;justify-content:space-between;margin-bottom:7px;font-size:.58rem}
.pd{color:#aaa}.prat{color:var(--gold);font-size:.77rem}
.ps{font-size:.64rem;line-height:1.65;color:#444;border-left:2px solid var(--red);padding-left:9px;font-style:italic;margin-bottom:9px}
.pf{display:flex;justify-content:space-between;border-top:1px solid var(--warm);padding-top:7px;font-size:.6rem}
.pm{color:var(--red);text-decoration:none;border-bottom:1px solid var(--red)}

/* OVERLAY */
.overlay{
  position:fixed;inset:0;background:#f5f0e8;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  transition:opacity .5s;
}
.overlay.gone{opacity:0;pointer-events:none}
.ot{font-family:'Playfair Display',serif;font-size:1.6rem;font-style:italic;color:var(--ink)}
.dots{display:flex;gap:9px}
.dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:bounce .8s infinite alternate}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{from{transform:translateY(0);opacity:.3}to{transform:translateY(-11px);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
.empty{padding:30px 16px;text-align:center}
.ei{font-size:2.2rem;margin-bottom:8px}
.et{font-family:'Playfair Display',serif;font-style:italic;margin-bottom:5px}
.es{font-size:.6rem;color:#aaa;line-height:1.7}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="ot">date <span style="color:var(--red)">spots</span></div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<header>
  <div class="logo">date <span>spots</span></div>
  <div class="hbtns">
    <a class="hbtn" href="https://www.notion.so/169ff260f2a7415cbb98ac89d586be50" target="_blank">↗ Notion</a>
    <button class="hbtn red" id="rbtn" onclick="loadSpots()">↻</button>
  </div>
</header>

<div id="map"></div>

<div class="sheet" id="sheet">
  <div class="sha" onclick="toggleSheet()">
    <div class="shh"></div>
    <div class="shp">
      <div>
        <div class="sht">📍 Spots kita</div>
        <div class="shs" id="psub">Loading...</div>
      </div>
      <div class="shst">
        <div class="sv"><div class="svv" id="scount">—</div><div class="svl">SPOTS</div></div>
        <div class="sv"><div class="svv" id="srating">—</div><div class="svl">AVG ★</div></div>
      </div>
    </div>
  </div>
  <div class="frow" id="frow">
    <button class="chip active" onclick="applyFilter('all',this)">Semua</button>
  </div>
  <div class="cards" id="cards">
    <div class="empty"><div class="ei">⏳</div><div class="et">Loading spots...</div></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  var map = L.map('map',{zoomControl:false}).setView([-6.2,106.8],11);
  L.control.zoom({position:'topright'}).addTo(map);

  // OSM standard — 100% free, grayscale via CSS filter
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19, attribution:'© OpenStreetMap contributors'
  }).addTo(map);

  var ALL=[], MARKERS=[], activeFilter='all', sheetOpen=false;

  window.toggleSheet=function(){
    sheetOpen=!sheetOpen;
    document.getElementById('sheet').classList.toggle('open',sheetOpen);
  };

  // Folium-style circular marker
  function mkIcon(active) {
    var s = active ? 26 : 20;
    return L.divIcon({
      html: '<div class="fmarker '+(active?'active':'')+'" style="width:'+s+'px;height:'+(s+8)+'px">'
          + (active ? '<div class="fmarker-pulse"></div>' : '')
          + '<div class="fmarker-circle"><div class="fmarker-dot"></div></div>'
          + '<div class="fmarker-shadow"></div>'
          + '</div>',
      className: '',
      iconSize: [s, s+8],
      iconAnchor: [s/2, s+6],
      popupAnchor: [0, -(s+6)]
    });
  }

  window.cycP=function(dot,idx){
    var g=dot.closest('.pg');
    g.querySelectorAll('img').forEach(function(img,i){img.classList.toggle('show',i===idx);});
    g.querySelectorAll('.pdot').forEach(function(d,i){d.classList.toggle('on',i===idx);});
  };

  function popHtml(spot){
    var photos=spot.photos||[],gal='';
    if(photos.length){
      var imgs=photos.map(function(u,i){return '<img src="'+u+'" class="'+(i===0?'show':'')+'" onerror="this.style.display=\'none\'">';}).join('');
      var dots=photos.length>1?'<div class="pdots">'+photos.map(function(_,i){return '<div class="pdot '+(i===0?'on':'')+'" onclick="cycP(this,'+i+')"></div>';}).join('')+'</div>':'';
      gal='<div class="pg">'+imgs+dots+'</div>';
    }else{gal='<div class="pg"><div class="ph">🌃</div></div>';}
    var fd=spot.date?new Date(spot.date+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}):'—';
    return '<div>'+gal+'<div class="pb">'
      +'<div class="pn">'+spot.name+'</div>'
      +'<div class="pr"><span class="pd">'+fd+(spot.kota?' · '+spot.kota:'')+'</span><span class="prat">'+(spot.rating||'')+'</span></div>'
      +(spot.story?'<div class="ps">'+spot.story+'</div>':'')
      +'<div class="pf"><span>'+(spot.mood||'')+'</span>'+(spot.gmaps?'<a class="pm" href="'+spot.gmaps+'" target="_blank">↗ Maps</a>':'')+'</div>'
      +'</div></div>';
  }

  function render(spots){
    MARKERS.forEach(function(m){map.removeLayer(m);}); MARKERS=[];
    document.getElementById('cards').innerHTML='';
    if(!spots.length){
      document.getElementById('cards').innerHTML='<div class="empty"><div class="ei">🔍</div><div class="et">Belum ada spots</div><div class="es">Tambahin di Notion,<br>lalu klik ↻ Refresh</div></div>';
      return;
    }
    var bounds=[];
    spots.forEach(function(spot,i){
      var lat=parseFloat(spot.lat),lng=parseFloat(spot.lng);
      if(isNaN(lat)||isNaN(lng)) return;
      bounds.push([lat,lng]);
      var mk=L.marker([lat,lng],{icon:mkIcon(false)}).addTo(map);
      mk.bindPopup(popHtml(spot),{maxWidth:260});
      mk.on('click',function(){activate(i);});
      MARKERS.push(mk);

      var fd=spot.date?new Date(spot.date+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short'}):'';
      var el=document.createElement('div');
      el.className='card'; el.dataset.i=i;
      var thumb=spot.photos&&spot.photos[0]?spot.photos[0]:'';
      el.innerHTML='<div class="cthumb" style="background:#e0202015">'
        +(thumb?'<img src="'+thumb+'" onerror="this.parentElement.innerHTML=\'📍\'">':'📍')
        +'</div><div class="cbody">'
        +'<div class="cname">'+spot.name+'</div>'
        +'<div class="cmeta"><span style="color:var(--gold)">'+(spot.rating||'')+'</span><span>'+fd+'</span>'+(spot.kota?'<span>📍'+spot.kota+'</span>':'')+'</div>'
        +(spot.mood?'<div class="cmood">'+spot.mood+'</div>':'')
        +(spot.story?'<div class="cstory">'+spot.story+'</div>':'')
        +'</div>';
      el.onclick=function(){activate(i);};
      document.getElementById('cards').appendChild(el);
    });
    if(bounds.length) map.fitBounds(bounds,{padding:[60,60]});
    buildFilters(); updateStats(spots);
    document.getElementById('psub').textContent=spots.length+' tempat ter-log';
  }

  function activate(i){
    ALL.forEach(function(_,j){if(MARKERS[j])MARKERS[j].setIcon(mkIcon(j===i));});
    if(MARKERS[i]){
      var lat=parseFloat(ALL[i].lat),lng=parseFloat(ALL[i].lng);
      if(!isNaN(lat)&&!isNaN(lng)) map.setView([lat,lng],Math.max(map.getZoom(),14),{animate:true});
      MARKERS[i].openPopup();
    }
    document.querySelectorAll('.card').forEach(function(c,j){
      c.classList.toggle('active',j===i);
      if(j===i) c.scrollIntoView({behavior:'smooth',block:'nearest'});
    });
    if(!sheetOpen){sheetOpen=true;document.getElementById('sheet').classList.add('open');}
  }

  function buildFilters(){
    var tags=new Set(); ALL.forEach(function(s){(s.tags||[]).forEach(function(t){tags.add(t);});});
    var row=document.getElementById('frow');
    row.innerHTML='<button class="chip '+(activeFilter==='all'?'active':'')+'" onclick="applyFilter(\'all\',this)">Semua</button>';
    tags.forEach(function(t){
      var b=document.createElement('button'); b.className='chip '+(activeFilter===t?'active':'');
      b.textContent=t; b.onclick=function(){applyFilter(t,b);}; row.appendChild(b);
    });
  }

  window.applyFilter=function(f,btn){
    activeFilter=f;
    document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active');}); btn.classList.add('active');
    ALL.forEach(function(s,i){var show=f==='all'||(s.tags||[]).indexOf(f)>-1;if(MARKERS[i]){if(show)map.addLayer(MARKERS[i]);else map.removeLayer(MARKERS[i]);}});
    document.querySelectorAll('.card').forEach(function(c,i){c.style.display=(f==='all'||(ALL[i]&&(ALL[i].tags||[]).indexOf(f)>-1))?'':'none';});
    updateStats(ALL.filter(function(s){return f==='all'||(s.tags||[]).indexOf(f)>-1;}));
  };

  var RM={'⭐⭐⭐⭐⭐':5,'⭐⭐⭐⭐':4,'⭐⭐⭐':3,'⭐⭐':2,'⭐':1};
  function updateStats(spots){
    document.getElementById('scount').textContent=spots.length;
    var rated=spots.filter(function(s){return RM[s.rating];});
    document.getElementById('srating').textContent=rated.length?(rated.reduce(function(a,s){return a+RM[s.rating];},0)/rated.length).toFixed(1):'—';
  }

  window.loadSpots=async function(){
    var btn=document.getElementById('rbtn');
    btn.innerHTML='<span class="spin">↻</span>'; btn.disabled=true;
    try{
      var r=await fetch('/api/spots');
      if(!r.ok) throw new Error('API '+r.status);
      var data=await r.json();
      ALL=data.spots||[]; render(ALL);
    }catch(e){
      document.getElementById('cards').innerHTML='<div class="empty"><div class="ei">⚠️</div><div class="et">Gagal load</div><div class="es">'+e.message+'</div></div>';
      document.getElementById('psub').textContent='Error';
    }finally{btn.innerHTML='↻'; btn.disabled=false;}
  };

  loadSpots().then(function(){
    setTimeout(function(){document.getElementById('overlay').classList.add('gone');},800);
  });
  map.on('click',function(){map.closePopup();});
});
</script>
</body>
</html>
